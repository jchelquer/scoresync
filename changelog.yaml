# Changelog de ScoreSync
# El primero de la lista es la versión actual.
# Tipos: nuevo | mejorado | corregido

- version: "1.7.0"
  date: "2026-07-23"
  changes:
    - type: mejorado
      text: "Ejecución reformulada completa: la temporización del cursor/sombreado ahora se elige explícitamente entre itinerario o compases (antes iba mezclado con \"Ejecutar con audio\", que ahora sólo controla si suena el audio de referencia y nunca se mezcla con la otra fuente), con un switch nuevo que recuerda la elección. La barra de controles quedó más compacta en los dos modos (compás y partitura): botones sólo con ícono, textos arriba de cada control (como en el rango), y en pantallas chicas el modo compás pasa a ser el default. El número de compás grande se puede editar en pausa para saltar directo a otro (con marcado visual sobre la partitura, igual que al hacer clic en un compás). \"Continuar\" vuelve a pedir el plan de ejecución en vez de ignorar cambios de rango hechos durante la pausa. De paso, las pantallas de marcado se renombraron a \"Sincronizar itinerario\"/\"Sincronizar compases\" para que los nombres coincidan en toda la app."

- version: "1.6.0"
  date: "2026-07-21"
  changes:
    - type: nuevo
      text: "Las obras dejan de ser privadas para navegar: cualquier usuario logueado que tenga el link puede ver la ficha, elegir qué parte seguir y ejecutar/navegar, sin ser el dueño. También puede cargar su propia parte a esa obra (con su propio dueño, independiente del de la obra) y editarla o borrarla — pero no la de otro. Lo que sigue siendo exclusivo del dueño de la obra: borrar la obra, el itinerario, el audio de referencia y sincronizar tiempos."
    - type: nuevo
      text: "Se puede editar el título, compositor, instrumento y parte de una partitura ya adjunta a una obra directamente desde la ficha de la obra (antes sólo se llegaba ahí desde \"Partes sueltas\")."
    - type: nuevo
      text: "La biblioteca ahora muestra las obras de TODOS los usuarios, no sólo las propias — cada tarjeta indica \"tuya\" o el nombre de quien la creó."
    - type: corregido
      text: "En la ficha de una obra, hacer clic en una parte que no era propia daba error (como si no existiera). Ahora se puede ver el estado de cualquier parte; sólo quien la subió ve los botones para editarla o reprocesarla."
    - type: mejorado
      text: "Las obras (en la biblioteca), las partes (dentro de cada obra) y el selector de parte del navegador ahora se listan en orden alfabético."
    - type: mejorado
      text: "Repaso de los datos de una parte: el título ya no se puede editar si la parte pertenece a una obra (usa el de la obra); si no se cargó un nombre de parte se muestra el instrumento en su lugar; el instrumento pasa a ser obligatorio; se sacó el campo de compositor por parte (ya está a nivel obra); y al cargar una parte, el selector de archivo va inmediatamente después del título."
    - type: corregido
      text: "El ancla detectada automáticamente podía quedar mucho más baja que el pentagrama real (una barra de compás casi nunca es perfectamente vertical, y la medición seguía una única columna de píxeles en vez de tolerar ese desvío) — el rectángulo del ancla ahora cubre la altura real de la barra."
    - type: mejorado
      text: "Pantalla \"Ajustar sistemas\": el botón de agregar ahora deja elegir dónde con un clic sobre la partitura, en vez de agregarlo siempre al final. Se puede mover un sistema completo arrastrando su centro (antes sólo se podían redimensionar los bordes), y duplicar uno existente (se ubica desplazado del original para poder distinguirlos, y después se mueve a su posición final arrastrándolo)."
    - type: corregido
      text: "El orden alfabético de las partes (dentro de una obra, en partes sueltas y en el selector del navegador) no quedaba bien cuando no tenían nombre de parte cargado: se ordenaba por ese campo vacío en vez de por el instrumento que termina mostrándose en su lugar."
    - type: mejorado
      text: "En la ficha de una obra: la sección de \"Partes\" (que puede ser larga) se movió después del audio de referencia y los botones de ejecución/sincronización, y \"Borrar obra\" queda al final, separado. Borrar una obra ahora exige escribir \"borrar <nombre de la obra>\" exactamente antes de habilitar el botón, en vez de un cuadro de confirmación del navegador."
    - type: mejorado
      text: "Al ejecutar una obra con el audio de referencia, el sonido del metrónomo arranca silenciado por default (se puede reactivar igual) — sonar junto con la música real quedaba mal."
    - type: mejorado
      text: "El aviso del próximo compás (el que va a cambiar la ventana de la partitura) ahora aparece hasta 4 compases antes, no recién en el último — cuando hay margen para eso; si el tramo es corto, avisa apenas se pueda. Además ahora identifica correctamente CUÁL es ese compás (el que hace falta que cambie la ventana, no siempre el inmediato siguiente) y lo mantiene fijo durante toda la anticipación."
    - type: corregido
      text: "Cuando el rango arrancaba cerca del final de una página, la ventana podía quedar con un solo sistema visible y el aviso de próximo compás no tenía dónde mostrarse (necesitaba un segundo sistema adyacente). Ahora en ese caso usa el espacio libre que queda debajo, dentro del mismo panel, al mismo tamaño con el que se lee el resto de la partitura (no estirado para ocupar todo ese espacio)."
    - type: corregido
      text: "Cambiar la velocidad de reproducción no tenía efecto real al ejecutar con el audio de referencia: el audio sonaba siempre a su ritmo original, sólo la cuenta al aire respetaba la velocidad elegida. Ahora también se le aplica al audio."
    - type: nuevo
      text: "Botón junto al slider de velocidad para volver directo a 100%."
    - type: mejorado
      text: "En modo partitura, \"Ejecutar con audio\" y \"Silenciar\" se movieron a la fila compacta de arriba, a continuación del bpm y el metrónomo (antes estaban en la otra fila, junto a Ejecutar/rango/zoom)."
    - type: nuevo
      text: "Botón \"Detener\": corta la ejecución y vuelve al estado inicial sin volver a arrancar sola (a diferencia de \"Reiniciar\", que sí arranca). Antes, una vez elegido \"Ejecutar con audio\" no había forma de cambiarlo sin recargar la página — ese campo (y otros que sólo se pueden tocar antes de arrancar) sólo se habilita en el estado inicial."

- version: "1.5.2"
  date: "2026-07-21"
  changes:
    - type: corregido
      text: "En \"Sincronizar por compás\", marcar, deshacer, editar a mano o usar el ajuste fino no actualizaba el plan que usa el seguimiento \"sonando\"/modo Reproducción — el ajuste quedaba invisible ahí hasta recargar la página."
    - type: corregido
      text: "La lista de compases scrolleaba de más (llevaba la fila arriba de todo aunque ya estuviera visible) y de menos (no scrolleaba cuando la fila activa dejaba de verse) — ahora sólo scrollea cuando hace falta, y en ese caso la lleva arriba de todo en vez de dejarla apenas asomando."
    - type: mejorado
      text: "Los botones de ajuste fino (±0,1s/±0,05s) ahora tienen fondo rojo o verde según retroceden o avanzan el tiempo, con más intensidad en el paso grande (0,1s) que en el chico (0,05s)."

- version: "1.5.1"
  date: "2026-07-21"
  changes:
    - type: mejorado
      text: "En \"Sincronizar por compás\", los comandos de marcado (Marcar/Saltear/Deshacer) y el ajuste fino se movieron de la tarjeta del reproductor a la de la lista de compases — lo que ajustan son las marcas de la lista, no la reproducción del audio en sí."

- version: "1.5.0"
  date: "2026-07-21"
  changes:
    - type: nuevo
      text: "Sincronización con audio real: subí una grabación de referencia por obra y completá Segmento.tiempo_inicio escuchándola, en vez de escribir segundos a mano. Dos formas, que conviven: por fila del itinerario (\"Sincronizar tiempos\") o compás a compás con repeticiones (\"Sincronizar por compás\", nueva) — tap con Espacio, Tab salta un compás sin marcarlo, click en cualquiera para corregir, edición manual, controles finos de audio (±0,1s/±1s), modo Marcado/Reproducción, selección múltiple con ajuste fino (corre varias marcas la misma fracción de segundo), y resaltado en verde/rojo/azul (sonando/próximo a marcar/seleccionado) tanto en la lista como en la partitura."
    - type: nuevo
      text: "\"Ejecutar con audio\" en el navegador: el audio de referencia gobierna el cursor en tiempo real mientras suena, en vez del tempo calculado — prioriza automáticamente la marca más precisa disponible en cada tramo (compás > fila > tiempo calculado) sin tener que elegir a mano. Con silenciar aparte, para seguir el tiempo real sin escuchar la grabación."
    - type: nuevo
      text: "Click sobre cualquier compás visible de la partitura, durante la ejecución en el navegador, para posicionarse ahí directo (pausa si estaba corriendo, y reubica el audio real si \"Ejecutar con audio\" está activo)."
    - type: nuevo
      text: "Números de compás visibles sobre la partitura, con switch para mostrarlos u ocultarlos — en las pantallas de sincronización y en el navegador de ejecución."
    - type: nuevo
      text: "La biblioteca pasa a ser una biblioteca de OBRAS: cargar una parte nueva siempre se hace desde la ficha de la obra (ya no hay carga suelta). Borrar una obra borra también sus partes de verdad, con confirmación que avisa cuántas. Las partes que igual queden sueltas (al separarlas, o si ya existían de antes) se ven y se pueden borrar aparte, en \"Partes sueltas\"."
    - type: nuevo
      text: "Velocidad de ejecución ampliada de 120% a 150%, con una marca fija en 100% sobre el slider para volver rápido al tempo original."
    - type: mejorado
      text: "El menú de navegación no se podía abrir en pantallas chicas (faltaba el botón para desplegarlo en mobile)."
    - type: mejorado
      text: "Los archivos (PDFs, audio) se limpian solos del servidor al borrar una parte o una obra, sin importar por dónde se borre — antes sólo pasaba si se usaba el botón de la app; borrar desde el admin de Django dejaba los archivos huérfanos en el servidor."
    - type: corregido
      text: "El audio de referencia no se podía buscar/seekear de verdad durante la ejecución ni en las pantallas de sincronización — el servidor de desarrollo nunca soportó pedidos de rango (\"Range requests\"), así que aunque se reposicionara el reproductor, la reproducción arrancaba siempre desde el principio del archivo."
    - type: corregido
      text: "El botón de borrar una obra no pedía confirmación — un error de comillas en el mensaje de confirmación rompía el chequeo del lado del navegador, que quedaba ignorado en silencio."

- version: "1.4.0"
  date: "2026-07-20"
  changes:
    - type: nuevo
      text: "El navegador recuerda, por usuario y por obra, el rango desde/hasta, loop, velocidad, compases al aire y la última parte elegida — se autoguarda solo (sin botón) cada vez que se cambia algo, y precompleta todo eso la próxima vez que se entra en vez de arrancar de cero. Un link explícito (ej. Anterior/Siguiente, uno compartido) sigue ganándole a lo guardado."
    - type: nuevo
      text: "El zoom preferido también se recuerda, pero por parte (no por obra) — cada parte puede necesitar un nivel distinto según su propia diagramación."
- version: "1.3.5"
  date: "2026-07-20"
  changes:
    - type: mejorado
      text: "El cambio de ventana en la ejecución con score ya no se adelanta 1 pulso antes de que termine el último compás visible — espera a que ese compás realmente termine de sonar antes de saltar a la próxima."
    - type: corregido
      text: "Un salto (a coda, repetición, etc.) que se anunciaba estando todavía en el primer sistema de una ventana recién mostrada no tenía dónde pintar la vista previa del próximo compás — ahora, si no hay sistema anterior disponible, usa el segundo en su lugar."

- version: "1.3.4"
  date: "2026-07-20"
  changes:
    - type: corregido
      text: "Guardar el itinerario podía romper con «llave duplicada... orden» al tocar una sola fila — el rango temporal que usa la vista para evitar colisiones coincidía con el que usa internamente renumerar_segmentos(), y se pisaban entre sí."
    - type: nuevo
      text: "La fila de cierre del itinerario (sin Desde/Hasta, sólo marca dónde termina el último compás real y muestra el tiempo estimado de fin de la obra) se agrega sola al guardar si todavía no existe — antes había que armarla a mano sin ninguna guía."
    - type: corregido
      text: "La fila de cierre podía terminar encajada en el medio de la tabla si una fila nueva se guardaba con un número de orden más alto que el suyo (fácil de tipear sin querer, no se distingue a simple vista salvo por tener Desde/Hasta vacíos) — y todo lo que quedara después se perdía en silencio del cálculo de tiempos. Ahora la fila de cierre siempre queda última al guardar, sin importar qué orden se le haya tipeado a las demás."
    - type: corregido
      text: "Cambiarle el orden a una sola fila para que pasara antes que las demás (ej. ponerle 5 para que vaya antes que la primera) no hacía nada — se calculaba su nueva posición sólo contra las otras filas tocadas en ese guardado, ignorando dónde debía quedar respecto de las que no se habían tocado."
    - type: corregido
      text: "El tiempo calculado de la primera fila aparecía como «—» en vez de 0:00:00 — el filtro del template trataba cualquier valor \"falsy\" (incluido un tiempo de exactamente cero) como si faltara."
    - type: nuevo
      text: "Obra, Segmento y Barra ahora están dados de alta en el admin de Django (antes sólo Partitura/Página/Sistema/Compás)."

- version: "1.3.3"
  date: "2026-07-20"
  changes:
    - type: nuevo
      text: "Borrar una partitura desde la biblioteca (con confirmación, avisando si está vinculada a una obra) — borra también sus archivos del servidor, no sólo el registro."
    - type: nuevo
      text: "Editar título, compositor, instrumento y parte de una partitura ya subida, desde la biblioteca — no permite cambiar el archivo, para no invalidar lo ya detectado y confirmado."

- version: "1.3.2"
  date: "2026-07-20"
  changes:
    - type: nuevo
      text: "Compases al aire (optativo, default 1) antes de la ejecución en tiempo real, con cuenta regresiva desde el número de pulsos hasta 1 en cada uno para fijar la atención. Vuelven a sonar cada vez que se retoma tras una pausa, no sólo al arrancar. Se avisan con un número grande propio en el margen del sistema (no el cursor de pulso normal, para no confundirlos con la obra ya empezada) y siempre visibles; el sonido respeta el switch de metrónomo."

- version: "1.3.1"
  date: "2026-07-20"
  changes:
    - type: nuevo
      text: "Control de velocidad para la ejecución en tiempo real (20%-120% del tempo original), con slider junto al botón de Ejecutar/Pausar/Continuar. Se puede ajustar en cualquier momento: si está sonando, tocarlo pausa automáticamente antes de aplicar el cambio; en pausa, el nuevo valor se aplica al toque, listo para retomar con Continuar."

- version: "1.3.0"
  date: "2026-07-20"
  changes:
    - type: nuevo
      text: "El rango desde/hasta del navegador acepta un pulso puntual (ej. 5,1.3 = compás 5, pulso 1 más 3 décimos), no sólo el compás entero."
    - type: nuevo
      text: "Atajos de teclado durante la ejecución: Espacio pausa/continúa, flechas izquierda/derecha van a Anterior/Siguiente."
    - type: nuevo
      text: "Logo propio de ScoreSync (favicon) y logo de Infedu-jch con link a infedu.com.ar en el pie de página."
    - type: mejorado
      text: "El recuadro que marca el compás actual se recorta proporcionalmente cuando sólo se va a tocar una parte de él (arranca o corta a mitad de pulso)."
    - type: mejorado
      text: "En modo partitura, el metrónomo visual y el sonido quedan accesibles en la barra compacta; el cursor de pulso sobre el score hace de indicador visual en cada pulso, sin un recuadro aparte."
    - type: mejorado
      text: "En modo partitura, Ejecutar/Pausar/Continuar/Reiniciar se reubicaron junto al rango y Anterior/Siguiente; los botones de navegación tienen forma de tecla de teclado."
    - type: corregido
      text: "El recorte y el cursor sobre el primer compás de cada sistema quedaban corridos por un dato de geometría (arranca en x=0, antes del margen real de la página)."

- version: "1.2.1"
  date: "2026-07-20"
  changes:
    - type: nuevo
      text: "Cursor sobre la partitura durante la ejecución: recorte del compás actual y del siguiente, uno al lado del otro, tomados de la parte correspondiente a la obra."
    - type: mejorado
      text: "Los silencios de varios compases muestran todo el tramo entre barras, con marcas señalando cuál parte corresponde al compás puntual."

- version: "1.2.0"
  date: "2026-07-20"
  changes:
    - type: nuevo
      text: "Navegador del itinerario: recorrer la obra compás a compás (manual o en tiempo real), con rango desde-hasta, repetición de pasada y loop."
    - type: nuevo
      text: "Ejecución en tiempo real con metrónomo visual y auditivo (acento en el primer pulso de cada compás, sonido apagable por separado) y tempo interpolado en los accelerando/ritardando, incluso si arrancan o cortan a mitad de compás."
    - type: nuevo
      text: "Pausar, continuar y reiniciar la ejecución, con Anterior/Siguiente siempre referidos al compás activo."

- version: "1.1.0"
  date: "2026-07-19"
  changes:
    - type: nuevo
      text: "Itinerario de ejecución por obra: tabla editable de tramos (compases, tempo, BPM) con guardado, reordenamiento y renumeración automática."

- version: "1.0.2"
  date: "2026-07-20"
  changes:
    - type: mejorado
      text: "Mejora de interfaz. Secuencia rigurosa."
      
- version: "1.0.1"
  date: "2026-07-19"
  changes:
    - type: nuevo
      text: "Detección automática de silencions múltiples. El usuario indica cuántos son para no tener que usar OCR."

- version: "1.0.0"
  date: "2026-07-18"
  changes:
    - type: nuevo
      text: "Corrección automática y asistida de orientación"
    - type: nuevo
      text: "Detección automática y corrección de márgenes"
    - type: nuevoE
      text: "Detección automática y corrección de sistemas"
    - type: nuevo
      text: "Detección de barras de compás y corrección manual"
    - type: nuevo
      text: "Numeración automática de compases y corrección manual"

- version: "0.1.0"
  date: "2026-07-17"
  changes:
    - type: nuevo
      text: "Base del proyecto: login compartido con afinación/ensayos/tempo, idioma, novedades y solicitud de acceso"
