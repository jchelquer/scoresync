{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% translate "Contraseña actualizada" %}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4 text-center">
        <div class="card border-0" style="background: var(--ss-surface)">
            <div class="card-body p-4">
                <h4 class="card-title mb-3" style="color: var(--ss-text-bright)">{% translate "¡Contraseña actualizada!" %}</h4>
                <p style="color: var(--ss-text-muted)">{% translate "Ya podés ingresar con tu nueva contraseña." %}</p>
                <a href="{% url 'login' %}" class="btn btn-ss mt-2">{% translate "Ir al login" %}</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
