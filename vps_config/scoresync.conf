# /etc/nginx/sites-available/scoresync.conf
# Django app: scoresync.infedu.com.ar
#
# Certbot va a modificar este archivo automáticamente al correr
# `sudo certbot --nginx -d scoresync.infedu.com.ar` (agrega los bloques
# `listen 443 ssl;`, `ssl_certificate ...` y el redirect HTTP→HTTPS). Lo
# que sigue es el estado ANTES de correr certbot — ver deploy_vps.md para
# el orden exacto de los pasos.
#
# A diferencia de ensayos/infedu (que sirven /static/ directo con nginx),
# acá NO hace falta un location /static/ — ScoreSync ya tiene WhiteNoise
# en el MIDDLEWARE (ver config/settings.py), que sirve los estáticos
# comprimidos y con manifest directamente a través de gunicorn. Sólo hace
# falta el alias para /media/ (los PDF subidos por los usuarios), que
# WhiteNoise no toca — en producción (DEBUG=False) Django no sirve
# MEDIA_URL solo, así que sin este alias esas rutas devolverían 404.

upstream scoresync_app {
    server unix:/run/scoresync/gunicorn.sock fail_timeout=0;
}

server {
    server_name scoresync.infedu.com.ar;

    access_log /var/log/nginx/scoresync.access.log;
    error_log  /var/log/nginx/scoresync.error.log;

    # Subida de PDFs — puede haber partituras de varias decenas de páginas.
    client_max_body_size 50M;

    location /media/ {
        alias /var/www/scoresync/media/;
        expires 7d;
    }

    location / {
        proxy_pass         http://scoresync_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        # Más generoso que el default (60s) — normalizar/detectar sistemas
        # corre SÍNCRONO (ver decisión de arquitectura del proyecto: nada
        # de threading/colas), y una partitura larga puede tardar bastante
        # en una sola request. Tiene que ser >= el --timeout de gunicorn
        # (ver scoresync.service) para que nginx no corte antes.
        proxy_read_timeout 150s;
    }

    listen 80;
}
